    const BOT_TOKEN = "YOUR_BOT_TOKEN";
    const CHAT_ID = "YOUR_CHAT_ID";
    
    async function sendToTelegram(formData) {
        const message = `📚 *НОВАЯ ЗАЯВКА НА КУРС*\n\n` +
                        `👤 *Имя:* ${formData.name}\n` +
                        `📞 *Телефон:* ${formData.phone}\n` +
                        `💬 *Telegram:* @${formData.telegram.replace('@', '')}\n` +
                        `🎓 *Курс:* ${formData.course}\n` +
                        `💰 *Тариф:* ${formData.tariff}\n` +
                        `📝 *Комментарий:* ${formData.comment || "—"}`;
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
            return response.ok;
        } catch (error) {
            console.error('Ошибка отправки:', error);
            return false;
        }
    }

                return course.tariffs.map(t => `<option value="${course.name} - ${t.name}">${course.name} (${t.name}, ${t.lessons} зан., ${t.price})</option>`).join('');

            }
            
            const formData = {
                name: modalDiv.querySelector('#studentName').value.trim(),
                phone: modalDiv.querySelector('#studentPhone').value.trim(),
                telegram: modalDiv.querySelector('#studentTelegram').value.trim(),
                course: courseValue,
                tariff: courseValue.split(' - ')[1] || 'Полный курс',
                comment: modalDiv.querySelector('#studentComment').value.trim()
            };
            
            if (!formData.name || !formData.phone || !formData.telegram) {
                alert('Пожалуйста, заполните все обязательные поля');
                return;
            }
            
            const submitBtn = form.querySelector('.submit-btn');
            submitBtn.textContent = 'Отправка...';
            submitBtn.disabled = true;
            
            const success = await sendToTelegram(formData);
            
            if (success) {
                alert('✅ Заявка успешно отправлена! Я свяжусь с вами в ближайшее время.');
                modalDiv.remove();
            } else {
                alert('❌ Ошибка отправки. Пожалуйста, попробуйте позже или свяжитесь напрямую по контактам ниже.');
                submitBtn.textContent = '✈️ Отправить заявку';
                submitBtn.disabled = false;
            }
        };
    }

        `;

        modalDiv.style.display = 'flex';
        modalDiv.querySelector('.close-modal').onclick = () => modalDiv.remove();

        modalDiv.querySelector('#modalBriefBtn').onclick = () => {

    function attachHandlersForCurrentPage(pageType) {
        if (pageType === 'design') {

                        showDesignModal(service);
                    }
                });
            });
            const globalBrief = document.getElementById('globalBriefBtn');
            if (globalBrief) globalBrief.onclick = () => alert("📋 Перейти к брифу: https://forms.fill/design_brief (демо).");
            const contactBtn = document.getElementById('contactDesignBtn');
            if (contactBtn) contactBtn.onclick = () => window.open('https://t.me/ekaterina_teacher', '_blank');
        } 
        else if (pageType === 'teaching') {
            const enrollBtn = document.getElementById('unifiedEnrollBtn');
            if (enrollBtn) enrollBtn.onclick = () => showEnrollmentModal();
            
            document.querySelectorAll('.buy-method').forEach(btn => {

        }
    }

    let currentDirection = 'design';
    const root = document.getElementById('proposalRoot');
    const btnDesign = document.getElementById('switchDesign');
    const btnTeaching = document.getElementById('switchTeaching');

    function setActiveDirection(dir) {
        if (dir === 'design') {
            btnDesign.classList.add('active');
            btnTeaching.classList.remove('active');
        } else {
            btnTeaching.classList.add('active');
            btnDesign.classList.remove('active');
        }
    }

    function render() {
        if (currentDirection === 'design') {
            root.innerHTML = renderDesignPage();
        } else {
            root.innerHTML = renderTeachingPage();
        }
        attachHandlersForCurrentPage(currentDirection);
    }

    btnDesign.onclick = () => {
        if (currentDirection === 'design') return;
        currentDirection = 'design';
        setActiveDirection('design');
        render();
    };
    btnTeaching.onclick = () => {
