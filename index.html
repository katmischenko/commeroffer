<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>КП | Дизайн & Преподавание | Развернутое предложение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .toggle-container {
            display: flex;
            gap: 20px;
            background: white;
            padding: 8px 16px;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            backdrop-filter: blur(2px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .toggle-btn {
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            color: #2c3e44;
        }

        .toggle-btn.active {
            background: #1e4a5f;
            color: white;
            box-shadow: 0 4px 10px rgba(30,74,95,0.2);
        }

        .proposal-wrapper {
            max-width: 1400px;
            width: 100%;
            transition: all 0.2s;
        }

        /* общие стили для обоих вариантов */
        .pdf-version, .point-version {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            padding: 48px 52px;
            transition: all 0.3s;
            animation: fadeSlideUp 0.45s ease;
        }
        .point-version {
            background: linear-gradient(145deg, #ffffff 0%, #fafcff 100%);
            border: 1px solid rgba(66, 153, 174, 0.2);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 2.6rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        h2 { font-size: 1.8rem; font-weight: 600; margin: 2rem 0 1.2rem 0; border-left: 5px solid #1e4a5f; padding-left: 20px; }
        h3 { font-weight: 600; font-size: 1.3rem; margin-bottom: 0.75rem; }
        .badge {
            display: inline-block;
            background: #eef2fa;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e4a5f;
        }
        hr { margin: 24px 0; border: none; height: 1px; background: #e2e8f0; }

        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin: 28px 0; }
        .course-card, .method-card, .service-card {
            background: #f9fbfd;
            padding: 24px;
            border-radius: 28px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .course-card:hover, .method-card:hover, .service-card:hover { transform: translateY(-4px); box-shadow: 0 12px 22px -10px rgba(0,0,0,0.08); }
        
        .tariff-group {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .tariff {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #e2edf2;
        }
        .tariff h4 { font-size: 1.1rem; color: #1e4a5f; margin-bottom: 8px; }
        .price { font-weight: 800; font-size: 1.3rem; color: #0f2b32; margin: 10px 0; }
        .btn-small {
            background: #1e4a5f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .btn-small:hover { background: #0f3a49; transform: scale(1.02); }

        .btn-primary, .btn-secondary {
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
        }
        .btn-primary { background: #1e4a5f; color: white; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .btn-primary:hover { background: #0f3a49; transform: scale(1.02); }
        .btn-secondary { background: white; border: 1.5px solid #cbdde4; color: #1e4a5f; }
        .btn-secondary:hover { border-color: #1e4a5f; background: #f0f6fa; }

        .contact-block {
            background: #f1f6f9;
            border-radius: 32px;
            padding: 28px 32px;
            margin-top: 32px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .contact-info { display: flex; gap: 24px; flex-wrap: wrap; }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 18px;
            border-radius: 60px;
        }
        .contact-item a { text-decoration: none; color: #1e4a5f; font-weight: 500; }
        
        /* модальное окно для деталей услуги */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 32px;
            position: relative;
            animation: fadeSlideUp 0.2s ease;
        }
        .close-modal {
            position: absolute;
            top: 20px; right: 24px;
            font-size: 28px;
            cursor: pointer;
            color: #5f7f8c;
        }
        @media (max-width: 780px) {
            .pdf-version, .point-version { padding: 28px 20px; }
            .grid-2col { grid-template-columns: 1fr; }
        }
        footer { margin-top: 40px; text-align: center; font-size: 0.8rem; color: #5f7f8c; }
        .package-note { background: #eef3f0; padding: 12px 20px; border-radius: 28px; margin: 20px 0; text-align: center; font-weight: 500; }
    </style>
</head>
<body>
<div class="toggle-container">
    <button id="showPdfBtn" class="toggle-btn active">📄 PDF-стиль · Подробное КП</button>
    <button id="showPointBtn" class="toggle-btn">📊 PowerPoint-стиль · Презентация</button>
</div>
<div class="proposal-wrapper" id="proposalRoot"></div>

<script>
    // ---- ОБЩИЕ ДАННЫЕ ----
    const coursesData = [
        { name: "Scratch", desc: "Визуальное программирование для детей и новичков. Развитие алгоритмического мышления.", tariffs: [{ name: "Базовый", lessons: 32, price: "320 BYN" }, { name: "Расширенный", lessons: 64, price: "590 BYN" }] },
        { name: "Python", desc: "От основ до создания проектов: боты, парсинг,数据分析. Подготовка к олимпиадам.", tariffs: [{ name: "Базовый", lessons: 32, price: "400 BYN" }, { name: "Расширенный", lessons: 64, price: "750 BYN" }] },
        { name: "HTML/CSS/JS", desc: "Верстка сайтов, адаптив, интерактивность. Финальный проект — личный сайт.", tariffs: [{ name: "Стандарт", lessons: 32, price: "420 BYN" }, { name: "Профессиональный", lessons: 64, price: "780 BYN" }] },
        { name: "Дизайн в Figma", desc: "Интерфейсы, прототипирование, авто-лейауты, дизайн-системы.", tariffs: [{ name: "Базовый", lessons: 32, price: "380 BYN" }, { name: "Расширенный", lessons: 64, price: "720 BYN" }] },
        { name: "Подготовка к ЕГЭ / ОГЭ по информатике", desc: "Разбор всех типов заданий, программирование (Python, алгоритмы), теория.", lessonsCount: 48, price: "680 BYN", singleTariff: true },
        { name: "Цифровая грамотность", desc: "Безопасность, работа с офисными пакетами, облачные сервисы, основы ИКТ.", lessonsCount: 24, price: "300 BYN", singleTariff: true }
    ];
    
    const methodPubs = [
        { title: "Метод. пособие по Python", desc: "120 страниц, задачи, теория, чек-листы для преподавателей и учеников.", price: "45 BYN" },
        { title: "Метод. пособие по HTML/CSS", desc: "Структура курса, макеты, готовые упражнения, адаптивная верстка.", price: "40 BYN" },
        { title: "Метод. пособие «Основы Figma»", desc: "Гайд по интерфейсу, компоненты, библиотеки, автолейаут + кейсы.", price: "50 BYN" }
    ];
    
    const designServices = [
        { name: "Landing Page", shortDesc: "Одностраничный сайт для продаж, мероприятия или услуги.", fullDesc: "Входит: аналитика, уникальный дизайн, адаптив под мобильные, прототип, правки 2 итерации. Срок: 5-7 дней. Стоимость: от 500 BYN." },
        { name: "Корпоративный сайт", shortDesc: "Многостраничный сайт для компании, каталог, новости.", fullDesc: "Входит: структура, дизайн всех типовых страниц, анимации, форма обратной связи, правки. Срок: 12-18 дней. Стоимость: от 1200 BYN." },
        { name: "Интернет-магазин", shortDesc: "Каталог, корзина, оформление заказа.", fullDesc: "Входит: дизайн карточек товаров, корзины, личного кабинета, адаптив, прототип корзины. Срок: 20-25 дней. Стоимость: от 2000 BYN." },
        { name: "Создание презентаций", shortDesc: "Презентации под бренд, для инвесторов, защиты проектов.", fullDesc: "Входит: концепция, визуализация данных, анимация, фирменный стиль. Срок: 2-5 дней. Стоимость: от 150 BYN за слайд." },
        { name: "Дизайн сайта (без верстки)", shortDesc: "Только дизайн-макет в Figma, готовый для передачи разработчику.", fullDesc: "Входит: дизайн главной и внутренних, UI-kit, адаптивные версии, интерактивный прототип. Срок: от 7 дней. Стоимость: от 800 BYN." }
    ];
    
    const stages = ["1. Брифинг и анализ задач", "2. Исследование и референсы", "3. Прототипирование", "4. Дизайн-концепция", "5. Согласование и правки", "6. Передача итоговых материалов"];
    
    // Модальное окно
    let currentModal = null;
    function showServiceDetail(service) {
        if (currentModal) currentModal.style.display = "none";
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3 style="margin-bottom: 16px;">🎯 ${service.name}</h3>
                <p style="margin-bottom: 12px;"><strong>Подробное описание:</strong> ${service.fullDesc}</p>
                <p style="margin-top: 16px;"><em>📌 Включено в стоимость: анализ, дизайн-макет, поддержка правок, финальные файлы.</em></p>
                <button class="btn-primary" id="modalOrderBtn" style="margin-top: 24px; width:100%; justify-content:center;">📋 Заполнить бриф →</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.style.display = 'flex';
        const closeSpan = modalDiv.querySelector('.close-modal');
        closeSpan.onclick = () => modalDiv.remove();
        modalDiv.onclick = (e) => { if(e.target === modalDiv) modalDiv.remove(); };
        const orderBtn = modalDiv.querySelector('#modalOrderBtn');
        orderBtn.onclick = () => {
            alert("📝 Ссылка на бриф: https://forms.fill/brief_design_teacher (демо). После заполнения мы свяжемся с вами для уточнения деталей.");
            modalDiv.remove();
        };
        currentModal = modalDiv;
    }
    
    function openBrief() {
        alert("📋 Перейти к брифу: https://forms.fill/design_teaching_brief (кликабельная ссылка-демо). Мы подготовим индивидуальное предложение в течение 1 дня.");
    }
    
    // рендер версии PDF (подробный)
    function renderPdfDetailed() {
        return `
        <div class="pdf-version">
            <div class="badge">КОММЕРЧЕСКОЕ ПРЕДЛОЖЕНИЕ | ДИЗАЙН + ОБРАЗОВАНИЕ</div>
            <h1>Дизайн-проекты и IT-образование</h1>
            <p style="font-size:1.1rem;color:#2c5a6e;">Преподаватель компьютерных курсов · графический дизайнер с 9-летним опытом</p>
            <p style="margin:20px 0">Комплексные решения: от дизайна сайтов и презентаций до обучения вашей команды или индивидуальных занятий по программированию и цифровой грамотности. Все программы составлены с учетом современных стандартов.</p>
            
            <h2>📚 Образовательные курсы</h2>
            <div class="grid-2col">
                ${coursesData.map(course => {
                    if (course.singleTariff) {
                        return `<div class="course-card"><h3>💻 ${course.name}</h3><p>${course.desc}</p><div class="tariff-group"><div class="tariff"><h4>📘 Курс</h4><div>${course.lessonsCount} занятий</div><div class="price">${course.price}</div><button class="btn-small select-course" data-course="${course.name}">Записаться</button></div></div></div>`;
                    } else {
                        return `<div class="course-card"><h3>💻 ${course.name}</h3><p>${course.desc}</p><div class="tariff-group">${course.tariffs.map(t => `<div class="tariff"><h4>${t.name}</h4><div>${t.lessons} занятий</div><div class="price">${t.price}</div><button class="btn-small select-course" data-course="${course.name} (${t.name})">Выбрать</button></div>`).join('')}</div></div>`;
                    }
                }).join('')}
            </div>
            
            <div class="package-note">
                🎁 Пакетные предложения: приобретите 2 любых курса со скидкой 10% или абонемент на 64 занятия (дизайн/программирование) — 10% экономии. Доступна рассрочка.
            </div>
            
            <h2>📖 Методологические пособия (можно приобрести отдельно)</h2>
            <div class="grid-2col" style="margin-bottom:20px">
                ${methodPubs.map(m => `<div class="method-card"><h3>📘 ${m.title}</h3><p>${m.desc}</p><div class="price" style="font-size:1.2rem">${m.price}</div><button class="btn-small buy-method" data-method="${m.title}">Купить пособие</button></div>`).join('')}
            </div>
            
            <h2>🎨 Дизайн-услуги (подробнее при клике)</h2>
            <div class="grid-2col">
                ${designServices.map(s => `<div class="service-card clickable-service" data-service='${JSON.stringify(s)}'><h3>✨ ${s.name}</h3><p>${s.shortDesc}</p><button class="btn-small more-detail" data-servicename="${s.name}">Узнать детали →</button></div>`).join('')}
            </div>
            
            <h2>⚙️ Этапы работы над дизайн-проектом</h2>
            <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:28px">
                ${stages.map(st => `<span style="background:#eef2f5; padding:8px 20px; border-radius:40px;">${st}</span>`).join('')}
            </div>
            <div style="text-align:center; margin:16px 0">
                <button class="btn-secondary" id="openBriefPdf">📋 Заполнить бриф на дизайн →</button>
            </div>
            
            <div class="contact-block">
                <div><strong>📞 Свяжитесь для записи на курс или заказа дизайна</strong><br>Консультация по подбору тарифа бесплатно</div>
                <div class="contact-info">
                    <div class="contact-item">📱 <a href="tel:+375291234567">+375 (29) 123-45-67</a></div>
                    <div class="contact-item">✉️ <a href="mailto:teacher.design@edu.by">teacher.design@edu.by</a></div>
                    <div class="contact-item">💬 <a href="https://t.me/design_teacher" target="_blank">@design_teacher</a></div>
                </div>
                <button class="btn-primary" id="actionMainPdf">💬 Написать в Telegram →</button>
            </div>
            <footer>Кликабельные кнопки: детали услуг, покупка пособий, запись на курсы. Актуально до 31.12.2025.</footer>
        </div>`;
    }
    
    // Point версия (презентационный стиль)
    function renderPointDetailed() {
        return `
        <div class="point-version">
            <div style="display:flex; justify-content:space-between"><div><div class="badge">✨ ПРЕЗЕНТАЦИЯ УСЛУГ / 2025</div><h1 style="margin-top:12px">Дизайн + Преподавание<br>Комплексный подход</h1></div><div style="font-size:3rem">🎓⚡</div></div>
            <p style="font-size:1.2rem; margin:20px 0">Авторские курсы по программированию и дизайну, профессиональная разработка визуальных решений для бизнеса. Преподаватель-практик.</p>
            
            <h2>🧩 Курсы с гибкими тарифами (32 / 64 занятия)</h2>
            <div class="grid-2col">
                ${coursesData.map(course => {
                    if (course.singleTariff) {
                        return `<div class="course-card"><h3>📌 ${course.name}</h3><p>${course.desc}</p><div><strong>${course.lessonsCount} ак. часов</strong> • ${course.price}</div><button class="btn-small select-course-point" data-course="${course.name}">Выбрать курс</button></div>`;
                    } else {
                        return `<div class="course-card"><h3>💡 ${course.name}</h3><p>${course.desc}</p><div class="tariff-group">${course.tariffs.map(t => `<div class="tariff"><h4>${t.name}</h4><div>${t.lessons} зан.</div><div class="price">${t.price}</div><button class="btn-small select-course-point" data-course="${course.name} (${t.name})">Записаться</button></div>`).join('')}</div></div>`;
                    }
                }).join('')}
            </div>
            <div class="package-note" style="background:#e2f0f5;">📦 Приобретите пакет из 64 занятий (любые курсы) со скидкой 8% + методологическое пособие в подарок!</div>
            
            <h2>📘 Методические пособия</h2>
            <div style="display:flex; flex-wrap:wrap; gap:20px; margin-bottom:30px">
                ${methodPubs.map(m => `<div style="flex:1; min-width:180px; background:#f5faff; border-radius:24px; padding:20px;"><h3>${m.title}</h3><p>${m.desc}</p><div style="font-weight:800; margin:12px 0">${m.price}</div><button class="btn-small buy-method-point" data-method="${m.title}">Приобрести</button></div>`).join('')}
            </div>
            
            <h2>✨ Дизайн-услуги (кликните для деталей)</h2>
            <div class="grid-2col">
                ${designServices.map(s => `<div class="service-card clickable-service-point" data-service='${JSON.stringify(s)}'><h3>🎨 ${s.name}</h3><p>${s.shortDesc}</p><button class="btn-small detail-point" data-name="${s.name}">Подробнее</button></div>`).join('')}
            </div>
            <div style="background:#f4f9fe; border-radius:28px; padding:20px; margin:24px 0">
                <h3>📋 Этапы дизайн-сопровождения</h3>
                <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:12px">${stages.map(st => `<span>✔️ ${st}</span>`).join(' • ')}</div>
                <button class="btn-secondary" id="openBriefPoint" style="margin-top:20px">📝 Заполнить бриф на разработку</button>
            </div>
            
            <div class="contact-block" style="background:#eef3f5;">
                <div><strong>🚀 Начнем сотрудничество?</strong><br>Подберём тариф и сроки под ваш запрос</div>
                <div class="contact-info">
                    <div class="contact-item">📞 <a href="tel:+375291234567">+375 (29) 123-45-67</a></div>
                    <div class="contact-item">✉️ <a href="mailto:teacher.design@edu.by">teacher.design@edu.by</a></div>
                    <div class="contact-item">💬 <a href="https://t.me/design_teacher" target="_blank">@design_teacher</a></div>
                </div>
                <button class="btn-primary" id="actionPointMain">🎯 Заказать консультацию</button>
            </div>
        </div>`;
    }
    
    // общая функция обработчиков для версии
    function attachHandlersForVersion(version) {
        // услуги: детали (модалка)
        const serviceCards = document.querySelectorAll('.clickable-service, .clickable-service-point, .more-detail, .detail-point');
        serviceCards.forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                let serviceData = null;
                if (el.closest('.service-card')) {
                    const attr = el.closest('.service-card').getAttribute('data-service');
                    if (attr) serviceData = JSON.parse(attr);
                }
                if (el.classList.contains('more-detail') || el.classList.contains('detail-point')) {
                    const parentCard = el.closest('.service-card');
                    if (parentCard && parentCard.getAttribute('data-service')) {
                        serviceData = JSON.parse(parentCard.getAttribute('data-service'));
                    }
                }
                if (serviceData) showServiceDetail(serviceData);
                else {
                    // fallback для кнопок из курсов
                    alert("Откройте детали услуги из карточки выше.");
                }
            });
        });
        
        // кнопки записи на курс
        document.querySelectorAll('.select-course, .select-course-point').forEach(btn => {
            btn.addEventListener('click', () => {
                const course = btn.getAttribute('data-course') || "курс";
                alert(`✅ Заявка на курс "${course}" отправлена! Менеджер свяжется для уточнения расписания и формы оплаты.`);
            });
        });
        // покупка метод. пособий
        document.querySelectorAll('.buy-method, .buy-method-point').forEach(btn => {
            btn.addEventListener('click', () => {
                const method = btn.getAttribute('data-method') || "пособие";
                alert(`📘 Вы выбрали "${method}". Для оформления перейдите в Telegram или на почту, мы вышлем счет. Спасибо!`);
            });
        });
        
        // брифы
        const briefPdf = document.getElementById('openBriefPdf');
        const briefPoint = document.getElementById('openBriefPoint');
        if (briefPdf) briefPdf.onclick = () => openBrief();
        if (briefPoint) briefPoint.onclick = () => openBrief();
        
        // основные кнопки действия
        const mainActionPdf = document.getElementById('actionMainPdf');
        const mainActionPoint = document.getElementById('actionPointMain');
        if (mainActionPdf) mainActionPdf.onclick = () => window.open('https://t.me/design_teacher', '_blank');
        if (mainActionPoint) mainActionPoint.onclick = () => alert("📞 Оставьте заявку: +375291234567 или напишите в Telegram @design_teacher — мы ответим в течение часа.");
        
        // дополнительно контакты уже кликабельны
    }
    
    let currentVersion = 'pdf';
    const root = document.getElementById('proposalRoot');
    const pdfBtn = document.getElementById('showPdfBtn');
    const pointBtn = document.getElementById('showPointBtn');
    
    function setActive(active) {
        if (active === 'pdf') { pdfBtn.classList.add('active'); pointBtn.classList.remove('active'); }
        else { pointBtn.classList.add('active'); pdfBtn.classList.remove('active'); }
    }
    
    function render() {
        if (currentVersion === 'pdf') root.innerHTML = renderPdfDetailed();
        else root.innerHTML = renderPointDetailed();
        attachHandlersForVersion(currentVersion);
    }
    
    pdfBtn.onclick = () => { if (currentVersion === 'pdf') return; currentVersion = 'pdf'; setActive('pdf'); render(); };
    pointBtn.onclick = () => { if (currentVersion === 'point') return; currentVersion = 'point'; setActive('point'); render(); };
    render();
</script>
</body>
</html>
